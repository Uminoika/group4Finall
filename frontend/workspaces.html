<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Workspaces - WorkSpace Finder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f4f4f4; }
    nav { background: #2E4057; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
    nav h1 { color: white; font-size: 20px; }
    nav div a { color: #cce0ff; text-decoration: none; margin-left: 15px; font-size: 14px; }
    nav div a:hover { color: white; }
    .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
    h2 { color: #2E4057; margin-bottom: 20px; }
    .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
    .search-bar input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
    .search-bar button { padding: 10px 20px; background: #2E4057; color: white; border: none; border-radius: 5px; cursor: pointer; }
    .filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
    .filters select { padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-size: 13px; }
    .workspace-card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
    .workspace-card h3 { color: #2E4057; margin-bottom: 5px; }
    .workspace-card p { color: #777; font-size: 14px; }
    .price { font-size: 18px; font-weight: bold; color: #2E4057; }
    .no-results { text-align: center; color: #999; margin-top: 50px; }
    footer { text-align: center; padding: 20px; background: #2E4057; color: #aaa; font-size: 13px; margin-top: 40px; }
  </style>
</head>
<body>
  <nav>
    <h1>WorkSpace Finder</h1>
    <div>
      <a href="#" onclick="logout()">Logout</a>
    </div>
  </nav>

  <div class="container">
    <h2>Search Workspaces</h2>
    <div class="search-bar">
      <input type="text" id="search" placeholder="Search by type, availability...">
      <button onclick="filterWorkspaces()">Search</button>
    </div>
    <div class="filters">
      <select id="filterType" onchange="filterWorkspaces()">
        <option value="">All Types</option>
        <option value="Meeting Room">Meeting Room</option>
        <option value="Private Office">Private Office</option>
        <option value="Open Desk">Open Desk</option>
      </select>
      <select id="filterTerm" onchange="filterWorkspaces()">
        <option value="">All Terms</option>
        <option value="Daily">Daily</option>
        <option value="Weekly">Weekly</option>
        <option value="Monthly">Monthly</option>
      </select>
      <select id="filterSmoking" onchange="filterWorkspaces()">
        <option value="">Smoking</option>
        <option value="Yes">Allowed</option>
        <option value="No">Not Allowed</option>
      </select>
    </div>
    <div id="workspaces-list"></div>
  </div>

  <footer>© 2026 WorkSpace Finder. All rights reserved.</footer>

  <script>
    let allWorkspaces = [];

    // Ensure user is logged in
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user) {
      window.location.href = 'login.html';
    }

    async function loadWorkspaces() {
      try {
        // Pass the authorization header token to prevent 401 Unauthorized blockages
        const response = await fetch('https://group4sodvwebdevfinal.onrender.com/workspaces', {
          method: 'GET',
          headers: {
            'Content-Type': 'application/json',
            'authorization': localStorage.getItem('token') // Attaches the JWT token
          }
        });

        if (!response.ok) {
          const errorData = await response.json();
          console.error('Server error:', errorData.message);
          document.getElementById('workspaces-list').innerHTML = `<p class="no-results" style="color: red;">Error: ${errorData.message}</p>`;
          return;
        }

        allWorkspaces = await response.json();
        displayWorkspaces(allWorkspaces);
      } catch (err) {
        console.error('Error loading workspaces:', err);
      }
    }

    function filterWorkspaces() {
      const search = document.getElementById('search').value.toLowerCase();
      const filterType = document.getElementById('filterType').value;
      const filterTerm = document.getElementById('filterTerm').value;
      const filterSmoking = document.getElementById('filterSmoking').value;

      const filtered = allWorkspaces.filter(w => {
        const matchSearch = !search || 
          (w.type && w.type.toLowerCase().includes(search)) || 
          (w.availability && w.availability.toLowerCase().includes(search));
        const matchType = !filterType || w.type === filterType;
        const matchTerm = !filterTerm || w.term === filterTerm;
        const matchSmoking = !filterSmoking || w.smoking === filterSmoking;
        return matchSearch && matchType && matchTerm && matchSmoking;
      });

      displayWorkspaces(filtered);
    }

    function displayWorkspaces(workspaces) {
      const list = document.getElementById('workspaces-list');
      if (workspaces.length === 0) {
        list.innerHTML = '<p class="no-results">No workspaces found.</p>';
        return;
      }
      
      // Updated data references from w.id to w._id to match MongoDB Atlas formats
      list.innerHTML = workspaces.map(w => `
        <div class="workspace-card" id="workspace-${w._id}">
          <div>
            <h3>${w.type}</h3>
            <p>${w.seats} seats · Smoking: ${w.smoking} · ${w.availability}</p>
            <p>Term: ${w.term}</p>
          </div>
          <div class="price">$${w.price}/${w.term}</div>
        </div>
      `).join('');
    }

    function logout() {
      localStorage.removeItem('user');
      localStorage.removeItem('token');
      window.location.href = 'login.html';
    }

    // Initial pull from live DB on load
    loadWorkspaces();
  </script>

</body>
</html>
